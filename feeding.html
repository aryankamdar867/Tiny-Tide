<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tiny Tide - Feeding Tracker</title>
    <style>
        
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); min-height: 100vh; padding: 20px; }
        .container { max-width: 1200px; margin: 0 auto; }
        .header { text-align: center; color: white; margin-bottom: 2rem; }
        .logo { font-size: 3rem; margin-bottom: 0.5rem; }
        .login-card { background: white; border-radius: 20px; padding: 3rem; box-shadow: 0 20px 60px rgba(0,0,0,0.3); max-width: 450px; margin: 0 auto; }
        .form-group { margin-bottom: 1.5rem; }
        .form-group label { display: block; margin-bottom: 0.5rem; font-weight: 600; }
        .form-group input, .form-group textarea { width: 100%; padding: 1rem; border: 2px solid #e0e0e0; border-radius: 10px; }
        .btn-login, .btn-add { width: 100%; padding: 1rem; color: white; border: none; border-radius: 10px; font-weight: 600; cursor: pointer; transition: 0.3s; }
        .btn-login { background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); }
        .btn-add { background: #27ae60; margin-top: 10px; }
        .dashboard { display: none; }
        .dashboard-header { background: white; border-radius: 20px; padding: 1.5rem; margin-bottom: 2rem; display: flex; justify-content: space-between; align-items: center;}
        .main-grid { display: grid; grid-template-columns: 1fr 2fr; gap: 2rem; }
        .add-feeding-card, .feeding-history-card { background: white; border-radius: 20px; padding: 2rem; box-shadow: 0 10px 30px rgba(0,0,0,0.1); }
        .stats-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(150px, 1fr)); gap: 1rem; margin-bottom: 2rem; }
        .stat-card { background: white; padding: 1.5rem; border-radius: 15px; text-align: center; box-shadow: 0 5px 15px rgba(0,0,0,0.1); }
        .stat-number { font-size: 1.5rem; font-weight: bold; color: #764ba2; }
        .feeding-item { background: #f8f9fa; border-radius: 15px; padding: 1.2rem; margin-bottom: 1rem; border-left: 5px solid #667eea; position: relative; }
        .type-option { flex: 1; padding: 1rem; border: 2px solid #e0e0e0; border-radius: 15px; text-align: center; cursor: pointer; font-weight: 600; }
        .type-option.active { background: #667eea; color: white; border-color: #667eea; }
        .btn-delete-item { position: absolute; top: 10px; right: 10px; background: #ffeded; color: #e74c3c; border: none; padding: 5px 10px; border-radius: 8px; cursor: pointer; font-size: 0.8rem; }
        .btn-delete-item:hover { background: #e74c3c; color: white; }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <div class="logo">🌊</div>
            <h1>Tiny Tide</h1>
            <p>Cloud Feeding Tracker</p>
        </div>

        <div id="loginSection" class="login-card">
            <h2>Login</h2><br>
            <form id="loginForm">
                <div class="form-group">
                    <label>Email</label>
                    <input type="email" id="loginEmail" required>
                </div>
                <div class="form-group">
                    <label>Password</label>
                    <input type="password" id="loginPassword" required>
                </div>
                <button type="submit" class="btn-login">Login to Cloud</button>
            </form>
        </div>

        <div id="dashboard" class="dashboard">
            <div class="dashboard-header">
                <div>
                    <h2 id="babyNameDisplay">👶 Baby: Loading...</h2>
                </div>
                <button onclick="logout()" style="background:#f8f9fa; border:1px solid #ddd; padding:8px 15px; border-radius:8px; cursor:pointer;">Logout</button>
            </div>

            <div class="stats-grid">
                <div class="stat-card"><div class="stat-number" id="totalFeedings">0</div><div>Total Today</div></div>
                <div class="stat-card"><div class="stat-number" id="breastFeedings" style="color:#e67e22">0</div><div>Breast</div></div>
                <div class="stat-card"><div class="stat-number" id="bottleFeedings" style="color:#2980b9">0</div><div>Bottle</div></div>
                <div class="stat-card"><div class="stat-number" id="totalQuantity">0</div><div>Total ml</div></div>
            </div>

            <div class="main-grid">
                <div class="add-feeding-card">
                    <h3>➕ Log Feeding</h3><br>
                    <form id="addFeedingForm">
                        <div style="display: flex; gap: 10px; margin-bottom: 15px;">
                            <div class="type-option active" id="opt-breast" onclick="selectType('breast')">🤱 Breast</div>
                            <div class="type-option" id="opt-bottle" onclick="selectType('bottle')">🍼 Bottle</div>
                        </div>
                        <div class="form-group">
                            <label id="qtyLabel">Duration (min)</label>
                            <input type="number" id="quantity" required>
                        </div>
                        <div class="form-group">
                            <label>Notes</label>
                            <textarea id="notes" rows="2"></textarea>
                        </div>
                        <button type="submit" class="btn-add">Save to Database</button>
                    </form>
                </div>

                <div class="feeding-history-card">
                    <h3>📋 History</h3><br>
                    <div id="feedingTimeline"></div>
                </div>
            </div>
        </div>
    </div>

    <script>
        let currentType = 'breast';
        const API_URL = 'http://localhost:3000/api';

        // 1. AUTH LOGIC
        document.getElementById('loginForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const email = document.getElementById('loginEmail').value;
            const password = document.getElementById('loginPassword').value;

            try {
                const res = await fetch(`${API_URL}/login`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ email, password })
                });
                const data = await res.json();
                if (data.token) {
                    localStorage.setItem('token', data.token);
                    localStorage.setItem('babyName', data.babyName);
                    showDashboard();
                } else { alert(data.error); }
            } catch (err) { alert("Server Connection Failed"); }
        });

        function showDashboard() {
            document.getElementById('loginSection').style.display = 'none';
            document.getElementById('dashboard').style.display = 'block';
            document.getElementById('babyNameDisplay').innerText = `👶 Baby: ${localStorage.getItem('babyName')}`;
            loadFeedings();
        }

        function selectType(type) {
            currentType = type;
            document.getElementById('opt-breast').classList.toggle('active', type === 'breast');
            document.getElementById('opt-bottle').classList.toggle('active', type === 'bottle');
            document.getElementById('qtyLabel').innerText = type === 'breast' ? 'Duration (min)' : 'Quantity (ml)';
        }

        // 2. SAVE DATA
        document.getElementById('addFeedingForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const feedingData = {
                type: currentType,
                quantity: document.getElementById('quantity').value,
                notes: document.getElementById('notes').value,
                timestamp: new Date()
            };

            try {
                const res = await fetch(`${API_URL}/feeding`, {
                    method: 'POST',
                    headers: { 
                        'Content-Type': 'application/json',
                        'Authorization': `Bearer ${localStorage.getItem('token')}` 
                    },
                    body: JSON.stringify(feedingData)
                });
                if (res.ok) {
                    document.getElementById('addFeedingForm').reset();
                    loadFeedings();
                }
            } catch (err) { console.error(err); }
        });

        // 3. LOAD DATA
        async function loadFeedings() {
            try {
                const res = await fetch(`${API_URL}/feeding`, {
                    headers: { 'Authorization': `Bearer ${localStorage.getItem('token')}` }
                });
                const feedings = await res.json();
                const timeline = document.getElementById('feedingTimeline');
                timeline.innerHTML = '';
                
                let stats = { total: 0, breast: 0, bottle: 0, ml: 0 };

                feedings.reverse().forEach(f => {
                    stats.total++;
                    if(f.type === 'breast') stats.breast++;
                    else { stats.bottle++; stats.ml += Number(f.quantity); }

                    const div = document.createElement('div');
                    div.className = 'feeding-item';
                    div.innerHTML = `
                        <button class="btn-delete-item" onclick="deleteFeeding('${f._id}')">Delete</button>
                        <strong>${f.type === 'breast' ? '🤱 Breast' : '🍼 Bottle'}</strong><br>
                        ${f.quantity} ${f.type === 'breast' ? 'min' : 'ml'} | ${new Date(f.timestamp).toLocaleTimeString([], {hour:'2-digit', minute:'2-digit'})}<br>
                        <small style="color:#777">${f.notes || ''}</small>
                    `;
                    timeline.appendChild(div);
                });

                document.getElementById('totalFeedings').innerText = stats.total;
                document.getElementById('breastFeedings').innerText = stats.breast;
                document.getElementById('bottleFeedings').innerText = stats.bottle;
                document.getElementById('totalQuantity').innerText = stats.ml;
            } catch (err) { console.error(err); }
        }

        // 4. DELETE DATA
        async function deleteFeeding(id) {
            if (!confirm("Are you sure you want to delete this log?")) return;
            try {
                const res = await fetch(`${API_URL}/feeding/${id}`, {
                    method: 'DELETE',
                    headers: { 'Authorization': `Bearer ${localStorage.getItem('token')}` }
                });
                if (res.ok) loadFeedings();
            } catch (err) { console.error(err); }
        }

        function logout() { localStorage.clear(); location.reload(); }
        if (localStorage.getItem('token')) showDashboard();
    </script>
</body>
</html>
