<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tiny Tide - Emergency & Healthcare Services</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px;
        }

        .container {
            max-width: 1200px;
            margin: 0 auto;
        }

        header {
            text-align: center;
            color: white;
            margin-bottom: 40px;
            animation: fadeIn 1s ease-in;
        }

        header h1 {
            font-size: 3em;
            margin-bottom: 10px;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.3);
        }

        header p {
            font-size: 1.2em;
            opacity: 0.9;
        }

        .search-card {
            background: white;
            border-radius: 20px;
            padding: 40px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.3);
            margin-bottom: 30px;
            animation: slideUp 0.8s ease-out;
        }

        .form-group {
            margin-bottom: 25px;
        }

        label {
            display: block;
            margin-bottom: 8px;
            color: #333;
            font-weight: 600;
            font-size: 1.1em;
        }

        input, select {
            width: 100%;
            padding: 15px;
            border: 2px solid #e0e0e0;
            border-radius: 10px;
            font-size: 1em;
            transition: all 0.3s;
        }

        input:focus, select:focus {
            outline: none;
            border-color: #667eea;
            box-shadow: 0 0 0 3px rgba(102, 126, 234, 0.1);
        }

        .btn-search {
            width: 100%;
            padding: 18px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            border-radius: 10px;
            font-size: 1.2em;
            font-weight: 600;
            cursor: pointer;
            transition: transform 0.2s, box-shadow 0.2s;
        }

        .btn-search:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 25px rgba(102, 126, 234, 0.4);
        }

        .btn-search:active {
            transform: translateY(0);
        }

        .emergency-banner {
            background: linear-gradient(135deg, #f093fb 0%, #f5576c 100%);
            color: white;
            padding: 20px;
            border-radius: 15px;
            margin-bottom: 30px;
            text-align: center;
            animation: pulse 2s infinite;
        }

        .emergency-banner h2 {
            margin-bottom: 10px;
        }

        .emergency-number {
            font-size: 2em;
            font-weight: bold;
            letter-spacing: 2px;
        }

        .results-container {
            display: none;
            animation: fadeIn 0.5s ease-in;
        }

        .results-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
            gap: 20px;
            margin-top: 20px;
        }

        .doctor-card {
            background: white;
            border-radius: 15px;
            padding: 25px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.2);
            transition: transform 0.3s, box-shadow 0.3s;
            cursor: pointer;
        }

        .doctor-card:hover {
            transform: translateY(-5px);
            box-shadow: 0 15px 40px rgba(0,0,0,0.3);
        }

        .doctor-icon {
            width: 60px;
            height: 60px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            margin-bottom: 15px;
            font-size: 1.8em;
        }

        .doctor-name {
            font-size: 1.4em;
            font-weight: 600;
            color: #333;
            margin-bottom: 5px;
        }

        .doctor-specialty {
            color: #667eea;
            font-weight: 500;
            margin-bottom: 10px;
        }

        .doctor-info {
            color: #666;
            margin-bottom: 8px;
            font-size: 0.95em;
        }

        .btn-contact {
            width: 100%;
            padding: 12px;
            background: #667eea;
            color: white;
            border: none;
            border-radius: 8px;
            margin-top: 15px;
            cursor: pointer;
            font-weight: 600;
            transition: background 0.3s;
        }

        .btn-contact:hover {
            background: #5568d3;
        }

        @keyframes fadeIn {
            from {
                opacity: 0;
            }
            to {
                opacity: 1;
            }
        }

        @keyframes slideUp {
            from {
                transform: translateY(30px);
                opacity: 0;
            }
            to {
                transform: translateY(0);
                opacity: 1;
            }
        }

        @keyframes pulse {
            0%, 100% {
                transform: scale(1);
            }
            50% {
                transform: scale(1.02);
            }
        }

        .loading {
            text-align: center;
            padding: 40px;
            display: none;
        }

        .spinner {
            border: 4px solid #f3f3f3;
            border-top: 4px solid #667eea;
            border-radius: 50%;
            width: 50px;
            height: 50px;
            animation: spin 1s linear infinite;
            margin: 0 auto;
        }

        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }
    </style>
</head>
<body>
    <div class="container">
        <header>
            <h1>🌊 Tiny Tide</h1>
            <p>Your Trusted Healthcare Companion</p>
        </header>

        <div class="emergency-banner">
            <h2>🚨 Emergency Services</h2>
            <div class="emergency-number">📞 102 / 108</div>
            <p>Available 24/7 - Ambulance & Emergency Response</p>
        </div>

        <div class="search-card">
            <h2 style="margin-bottom: 30px; color: #333;">Find Healthcare Services Near You</h2>
            <form id="searchForm">
                <div class="form-group">
                    <label for="pincode">📍 Pincode</label>
                    <input type="text" id="pincode" placeholder="Enter your pincode (e.g., 414001)" required>
                </div>

                <div class="form-group">
                    <label for="area">🏘️ Area / Locality</label>
                    <input type="text" id="area" placeholder="Enter your area name" required>
                </div>

                <div class="form-group">
                    <label for="specialty">👨‍⚕️ Select Specialty</label>
                    <select id="specialty" required>
                        <option value="">Choose a specialty</option>
                        <option value="emergency">Emergency Services</option>
                        <option value="pediatrician">Pediatrician (Child Specialist)</option>
                        <option value="gynecologist">Gynecologist (Women's Health)</option>
                        <option value="general">General Physician</option>
                    </select>
                </div>

                <button type="submit" class="btn-search">🔍 Find Healthcare Providers</button>
            </form>
        </div>

        <div class="loading" id="loading">
            <div class="spinner"></div>
            <p style="margin-top: 20px; color: white; font-size: 1.2em;">Searching for healthcare providers...</p>
        </div>

        <div class="results-container" id="results">
            <div class="search-card">
                <h2 style="color: #333; margin-bottom: 20px;">Healthcare Providers Near You</h2>
                <div class="results-grid" id="resultsGrid"></div>
            </div>
        </div>
    </div>

    <script>
        
        const sampleData = {
            emergency: [
                { name: "City Emergency Hospital", specialty: "Emergency Care", phone: "0241-2345678", address: "Main Road", distance: "1.2 km", icon: "🏥", hours: "24/7", rating: "4.5" },
                { name: "District Hospital Emergency", specialty: "24/7 Emergency", phone: "0241-2345679", address: "Station Road", distance: "2.5 km", icon: "🚑", hours: "24/7", rating: "4.3" },
                { name: "Lifeline Emergency Center", specialty: "Trauma Care", phone: "0241-2345680", address: "Civil Lines", distance: "3.1 km", icon: "⚕️", hours: "24/7", rating: "4.7" },
                { name: "Apollo Emergency Wing", specialty: "Critical Care", phone: "0241-2345681", address: "Bypass Road", distance: "3.8 km", icon: "🏥", hours: "24/7", rating: "4.6" },
                { name: "Max Healthcare Emergency", specialty: "Emergency & Trauma", phone: "0241-2345682", address: "Industrial Area", distance: "4.2 km", icon: "🚑", hours: "24/7", rating: "4.4" }
            ],
            pediatrician: [
                { name: "Dr. Priya Sharma", specialty: "Pediatrician", phone: "0241-2456789", address: "Children's Clinic, Nehru Nagar", distance: "0.8 km", icon: "👶", hours: "9 AM - 7 PM", rating: "4.8" },
                { name: "Dr. Rajesh Kumar", specialty: "Child Specialist", phone: "0241-2456790", address: "Kids Care Hospital", distance: "1.5 km", icon: "👨‍⚕️", hours: "10 AM - 8 PM", rating: "4.6" },
                { name: "Dr. Anita Desai", specialty: "Pediatrician", phone: "0241-2456791", address: "Little Angels Clinic", distance: "2.2 km", icon: "👶", hours: "8 AM - 6 PM", rating: "4.7" },
                { name: "Rainbow Children's Hospital", specialty: "Pediatric Care", phone: "0241-2456792", address: "MG Road", distance: "2.8 km", icon: "🏥", hours: "24/7", rating: "4.9" },
                { name: "Dr. Vikram Malhotra", specialty: "Neonatologist & Pediatrician", phone: "0241-2456793", address: "Sunshine Children's Center", distance: "3.2 km", icon: "👨‍⚕️", hours: "9 AM - 5 PM", rating: "4.5" },
                { name: "Dr. Shalini Kapoor", specialty: "Pediatric Surgeon", phone: "0241-2456794", address: "Care & Cure Hospital", distance: "3.7 km", icon: "👶", hours: "11 AM - 7 PM", rating: "4.8" },
                { name: "Tiny Tots Medical Center", specialty: "Pediatric Emergency", phone: "0241-2456795", address: "Park Street", distance: "4.1 km", icon: "🏥", hours: "24/7", rating: "4.4" }
            ],
            gynecologist: [
                { name: "Dr. Sunita Patel", specialty: "Gynecologist", phone: "0241-2567890", address: "Women's Health Center", distance: "1.0 km", icon: "👩‍⚕️", hours: "10 AM - 6 PM", rating: "4.7" },
                { name: "Dr. Meera Reddy", specialty: "Obstetrician & Gynecologist", phone: "0241-2567891", address: "Maternity Hospital, Sadar", distance: "1.8 km", icon: "🤰", hours: "9 AM - 8 PM", rating: "4.8" },
                { name: "Dr. Kavita Singh", specialty: "Women's Health Specialist", phone: "0241-2567892", address: "Care Hospital", distance: "2.4 km", icon: "👩‍⚕️", hours: "8 AM - 7 PM", rating: "4.6" },
                { name: "Motherhood Hospital", specialty: "Maternity & Gynecology", phone: "0241-2567893", address: "Ring Road", distance: "3.0 km", icon: "🏥", hours: "24/7", rating: "4.9" },
                { name: "Dr. Rekha Menon", specialty: "Fertility Specialist", phone: "0241-2567894", address: "Nova IVF Clinic", distance: "3.5 km", icon: "👩‍⚕️", hours: "10 AM - 5 PM", rating: "4.7" },
                { name: "Dr. Pooja Agarwal", specialty: "High-Risk Pregnancy", phone: "0241-2567895", address: "Cloudnine Hospital", distance: "3.9 km", icon: "🤰", hours: "24/7", rating: "4.8" },
                { name: "Dr. Naina Chopra", specialty: "Gynecologist & Laparoscopic Surgeon", phone: "0241-2567896", address: "Women's Wellness Clinic", distance: "4.3 km", icon: "👩‍⚕️", hours: "11 AM - 7 PM", rating: "4.5" },

            ],
            general: [
                { name: "Dr. Amit Verma", specialty: "General Physician", phone: "0241-2678901", address: "Health Plus Clinic", distance: "0.5 km", icon: "⚕️", hours: "9 AM - 9 PM", rating: "4.5" },
                { name: "Dr. Sneha Joshi", specialty: "Family Doctor", phone: "0241-2678902", address: "Community Health Center", distance: "1.3 km", icon: "👨‍⚕️", hours: "8 AM - 8 PM", rating: "4.6" },
                { name: "Dr. Ramesh Gupta", specialty: "General Practitioner", phone: "0241-2678903", address: "City Clinic", distance: "2.0 km", icon: "🩺", hours: "10 AM - 6 PM", rating: "4.4" },
                { name: "Dr. Lakshmi Iyer", specialty: "Internal Medicine", phone: "0241-2678904", address: "Wellness Medical Center", distance: "2.6 km", icon: "⚕️", hours: "9 AM - 7 PM", rating: "4.7" },
                { name: "Dr. Arjun Nair", specialty: "Family Physician", phone: "0241-2678905", address: "LifeCare Clinic", distance: "3.1 km", icon: "👨‍⚕️", hours: "8 AM - 10 PM", rating: "4.5" },
                { name: "Dr. Deepa Rao", specialty: "General Medicine", phone: "0241-2678906", address: "MediPlus Hospital", distance: "3.7 km", icon: "🩺", hours: "24/7", rating: "4.6" }
            ]
        };

        document.getElementById('searchForm').addEventListener('submit', function(e) {
            e.preventDefault();
            
            const pincode = document.getElementById('pincode').value;
            const area = document.getElementById('area').value;
            const specialty = document.getElementById('specialty').value;

            if (!pincode || !area || !specialty) {
                alert('Please fill in all fields');
                return;
            }

            document.getElementById('loading').style.display = 'block';
            document.getElementById('results').style.display = 'none';

            setTimeout(() => {
                displayResults(specialty, area);
                document.getElementById('loading').style.display = 'none';
                document.getElementById('results').style.display = 'block';
                document.getElementById('results').scrollIntoView({ behavior: 'smooth' });
            }, 1500);
        });

        function displayResults(specialty, area) {
            const resultsGrid = document.getElementById('resultsGrid');
            resultsGrid.innerHTML = '';

            const providers = sampleData[specialty] || [];

            providers.forEach(provider => {
                const card = document.createElement('div');
                card.className = 'doctor-card';
                card.innerHTML = `
                    <div class="doctor-icon">${provider.icon}</div>
                    <div class="doctor-name">${provider.name}</div>
                    <div class="doctor-specialty">${provider.specialty}</div>
                    <div class="doctor-info">📍 ${provider.address}, ${area}</div>
                    <div class="doctor-info">📞 ${provider.phone}</div>
                    <div class="doctor-info">🚗 ${provider.distance} away</div>
                    <div class="doctor-info">🕐 ${provider.hours}</div>
                    <div class="doctor-info">⭐ ${provider.rating}/5.0</div>
                    <button class="btn-contact" onclick="contactProvider('${provider.name}', '${provider.phone}')">
                        Contact Now
                    </button>
                `;
                resultsGrid.appendChild(card);
            });
        }

        function contactProvider(name, phone) {
            alert(`Calling ${name} at ${phone}\n\nIn a real application, this would initiate a call or open your phone dialer.`);
        }
    </script>
    <script src="api.js"></script>
</body>
</html>
