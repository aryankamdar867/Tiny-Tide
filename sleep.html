<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Sleep Monitor - Tiny Tide</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #4a5f9d 0%, #2d3561 100%);
            min-height: 100vh;
            padding: 20px;
        }

        .container {
            max-width: 1200px;
            margin: 0 auto;
        }

        .header {
            text-align: center;
            color: white;
            margin-bottom: 40px;
        }

        .header h1 {
            font-size: 2.5em;
            margin-bottom: 10px;
        }

        .header p {
            font-size: 1.2em;
            opacity: 0.9;
        }

        .main-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 30px;
            margin-bottom: 30px;
        }

        .card {
            background: white;
            border-radius: 20px;
            padding: 30px;
            box-shadow: 0 10px 40px rgba(0,0,0,0.2);
        }

        .card h2 {
            color: #4a5f9d;
            margin-bottom: 20px;
            font-size: 1.8em;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .timer-card {
            text-align: center;
        }

        .timer-display {
            font-size: 4em;
            font-weight: bold;
            color: #4a5f9d;
            margin: 30px 0;
            font-family: 'Courier New', monospace;
        }

        .timer-buttons {
            display: flex;
            gap: 15px;
            justify-content: center;
            margin-bottom: 20px;
        }

        .btn {
            padding: 15px 30px;
            border: none;
            border-radius: 10px;
            font-size: 1.1em;
            cursor: pointer;
            font-weight: 600;
            transition: transform 0.2s;
        }

        .btn:hover {
            transform: translateY(-2px);
        }

        .btn:disabled {
            opacity: 0.6;
            cursor: not-allowed;
            transform: none;
        }

        .btn-start {
            background: linear-gradient(135deg, #52c234 0%, #3da82a 100%);
            color: white;
        }

        .btn-stop {
            background: linear-gradient(135deg, #ff6b6b 0%, #ee5a52 100%);
            color: white;
        }

        .btn-primary {
            background: linear-gradient(135deg, #4a5f9d 0%, #2d3561 100%);
            color: white;
        }

        .sleep-type {
            display: flex;
            gap: 10px;
            justify-content: center;
            margin-bottom: 20px;
        }

        .sleep-type button {
            padding: 10px 20px;
            border: 2px solid #4a5f9d;
            background: white;
            color: #4a5f9d;
            border-radius: 10px;
            cursor: pointer;
            font-weight: 600;
            transition: all 0.3s;
        }

        .sleep-type button.active {
            background: #4a5f9d;
            color: white;
        }

        .form-group {
            margin-bottom: 20px;
        }

        .form-group label {
            display: block;
            margin-bottom: 8px;
            color: #333;
            font-weight: 600;
        }

        .form-group input,
        .form-group select,
        .form-group textarea {
            width: 100%;
            padding: 12px;
            border: 2px solid #e0e0e0;
            border-radius: 10px;
            font-size: 1em;
        }

        .form-group input:focus,
        .form-group select:focus,
        .form-group textarea:focus {
            outline: none;
            border-color: #4a5f9d;
        }

        .sleep-log {
            max-height: 400px;
            overflow-y: auto;
        }

        .sleep-entry {
            background: #f8f9fa;
            padding: 15px;
            border-radius: 10px;
            margin-bottom: 15px;
            border-left: 4px solid #4a5f9d;
        }

        .sleep-entry-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 10px;
        }

        .sleep-entry-type {
            font-weight: bold;
            color: #4a5f9d;
        }

        .sleep-entry-duration {
            font-size: 1.2em;
            font-weight: bold;
            color: #52c234;
        }

        .sleep-entry-details {
            font-size: 0.9em;
            color: #666;
            line-height: 1.6;
        }

        .delete-btn {
            background: #ff6b6b;
            color: white;
            border: none;
            padding: 5px 15px;
            border-radius: 5px;
            cursor: pointer;
            font-size: 0.9em;
        }

        .ai-insights {
            background: #f0f4ff;
            padding: 20px;
            border-radius: 10px;
            margin-top: 20px;
        }

        .ai-insights h3 {
            color: #4a5f9d;
            margin-bottom: 15px;
        }

        .ai-insights-text {
            color: #333;
            line-height: 1.8;
            white-space: pre-wrap;
        }

        .loading {
            text-align: center;
            color: #4a5f9d;
            padding: 20px;
        }

        .stats-grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 15px;
            margin-bottom: 20px;
        }

        .stat-box {
            background: #f8f9fa;
            padding: 15px;
            border-radius: 10px;
            text-align: center;
        }

        .stat-value {
            font-size: 2em;
            font-weight: bold;
            color: #4a5f9d;
        }

        .stat-label {
            font-size: 0.9em;
            color: #666;
            margin-top: 5px;
        }

        @media (max-width: 968px) {
            .main-grid {
                grid-template-columns: 1fr;
            }

            .timer-display {
                font-size: 3em;
            }

            .stats-grid {
                grid-template-columns: 1fr;
            }
            .dashboard-header {
    background: white;
    border-radius: 20px;
    padding: 1.5rem;
    margin-bottom: 2rem;
    display: flex;
    justify-content: space-between;
    align-items: center;
    box-shadow: 0 10px 30px rgba(0,0,0,0.05);
}

.logout-btn {
    background: #f8f9fa;
    border: 1px solid #ddd;
    padding: 8px 15px;
    border-radius: 8px;
    cursor: pointer;
    font-weight: 600;
    transition: 0.3s;
}

.logout-btn:hover {
    background: #ffeded;
    color: #e74c3c;
    border-color: #e74c3c;
}
        }
    </style>
</head>
<body>
    <div id="dashboard" class="dashboard" style="display: block;">
    <div class="dashboard-header">
        <div>
            <h2 id="babyNameDisplay">👶 Baby: Loading...</h2>
        </div>
        <button onclick="logout()" class="logout-btn">Logout</button>
    </div>

    <div class="main-grid">
         </div>
</div>
    <div class="container">
        <div class="header">
            <h1>😴 Tiny Tide Sleep Monitor</h1>
            <p>Track and analyze your baby's sleep patterns with AI</p>
        </div>

        <div class="main-grid">
            <div class="card timer-card">
                <h2>⏰ Sleep Timer</h2>
                
                <div class="sleep-type">
                    <button id="napBtn" class="active">Nap</button>
                    <button id="nightBtn">Night Sleep</button>
                </div>

                <div class="timer-display" id="timerDisplay">00:00:00</div>

                <div class="timer-buttons">
                    <button class="btn btn-start" id="startBtn">Start Sleep</button>
                    <button class="btn btn-stop" id="stopBtn" disabled>End Sleep</button>
                </div>

                <div class="form-group">
                    <label for="sleepNotes">Notes (optional)</label>
                    <textarea id="sleepNotes" rows="3" placeholder="How did baby fall asleep? Any issues?"></textarea>
                </div>

                <div class="form-group">
                    <label for="babyAge">Baby's Age (months)</label>
                    <input type="number" id="babyAge" min="0" max="36" placeholder="Enter age for better insights">
                </div>
            </div>

            <div class="card">
                <h2>📊 Today's Statistics</h2>
                <div class="stats-grid">
                    <div class="stat-box">
                        <div class="stat-value" id="totalSleepStat">0h</div>
                        <div class="stat-label">Total Sleep</div>
                    </div>
                    <div class="stat-box">
                        <div class="stat-value" id="napCountStat">0</div>
                        <div class="stat-label">Naps</div>
                    </div>
                    <div class="stat-box">
                        <div class="stat-value" id="nightSleepStat">0h</div>
                        <div class="stat-label">Night Sleep</div>
                    </div>
                </div>

                <button class="btn btn-primary" id="getInsightsBtn" style="width: 100%; margin-bottom: 20px;">
                    Get AI Sleep Insights
                </button>

                <div class="ai-insights" id="aiInsights" style="display: none;">
                    <h3>🤖 AI Analysis</h3>
                    <div id="insightsText" class="ai-insights-text"></div>
                </div>
            </div>
        </div>

        <div class="card">
            <h2>📝 Sleep Log</h2>
            <div class="sleep-log" id="sleepLog">
                <p style="text-align: center; color: #666; padding: 40px;">No sleep records yet. Start tracking!</p>
            </div>
        </div>
    </div>

    <script>
        // Configuration
const API_URL = 'http://localhost:3000/api';

// 1. RUN THIS ON PAGE LOAD
function initGlobalAuth() {
    const token = localStorage.getItem('token');
    const babyName = localStorage.getItem('babyName');

    if (!token) {
        // If no token exists, send them back to the main login page
        window.location.href = 'mainpage.htm'; 
        return;
    }

    // Update the UI with the baby's name saved during login
    const displayElement = document.getElementById('babyNameDisplay');
    if (displayElement) {
        displayElement.innerText = `👶 Baby: ${babyName}`;
    }
}

// 2. LOGOUT FUNCTION (Same for all pages)
function logout() {
    localStorage.clear(); // Wipes token and baby info
    window.location.href = 'mainpage.htm';
}

// Execute immediately
initGlobalAuth();
        let timerInterval = null;
        let startTime = null;
        let sleepType = 'nap';
        let sleepRecords = [];

        const timerDisplay = document.getElementById('timerDisplay');
        const startBtn = document.getElementById('startBtn');
        const stopBtn = document.getElementById('stopBtn');
        const napBtn = document.getElementById('napBtn');
        const nightBtn = document.getElementById('nightBtn');
        const sleepLog = document.getElementById('sleepLog');

        napBtn.addEventListener('click', () => {
            sleepType = 'nap';
            napBtn.classList.add('active');
            nightBtn.classList.remove('active');
        });

        nightBtn.addEventListener('click', () => {
            sleepType = 'night';
            nightBtn.classList.add('active');
            napBtn.classList.remove('active');
        });

        startBtn.addEventListener('click', startSleep);
        stopBtn.addEventListener('click', stopSleep);
        document.getElementById('getInsightsBtn').addEventListener('click', getAIInsights);

        function startSleep() {
            startTime = Date.now();
            startBtn.disabled = true;
            stopBtn.disabled = false;
            napBtn.disabled = true;
            nightBtn.disabled = true;

            timerInterval = setInterval(() => {
                const elapsed = Date.now() - startTime;
                const hours = Math.floor(elapsed / 3600000);
                const minutes = Math.floor((elapsed % 3600000) / 60000);
                const seconds = Math.floor((elapsed % 60000) / 1000);
                timerDisplay.textContent = 
                    `${String(hours).padStart(2, '0')}:${String(minutes).padStart(2, '0')}:${String(seconds).padStart(2, '0')}`;
            }, 1000);
        }

        function stopSleep() {
            clearInterval(timerInterval);
            const endTime = Date.now();
            const duration = endTime - startTime;
            const hours = Math.floor(duration / 3600000);
            const minutes = Math.floor((duration % 3600000) / 60000);

            const record = {
                id: Date.now(),
                type: sleepType,
                start: new Date(startTime),
                end: new Date(endTime),
                duration: duration,
                durationText: `${hours}h ${minutes}m`,
                notes: document.getElementById('sleepNotes').value
            };

            sleepRecords.unshift(record);
            displaySleepLog();
            updateStatistics();

            timerDisplay.textContent = '00:00:00';
            startBtn.disabled = false;
            stopBtn.disabled = true;
            napBtn.disabled = false;
            nightBtn.disabled = false;
            document.getElementById('sleepNotes').value = '';
        }

        function displaySleepLog() {
            if (sleepRecords.length === 0) {
                sleepLog.innerHTML = '<p style="text-align: center; color: #666; padding: 40px;">No sleep records yet. Start tracking!</p>';
                return;
            }
            async function saveSleep() {
    const sleepData = {
        startTime: document.getElementById('startTime').value,
        endTime: document.getElementById('endTime').value,
        notes: document.getElementById('sleepNotes').value
    };

    const response = await fetch('http://localhost:3000/api/sleep', {
        method: 'POST',
        headers: { 
            'Content-Type': 'application/json',
            'Authorization': `Bearer ${localStorage.getItem('token')}` 
        },
        body: JSON.stringify(sleepData)
    });

    if (response.ok) {
        alert("Sleep log saved to cloud!");
        loadSleepHistory(); // Refresh your list
    }
}

            sleepLog.innerHTML = sleepRecords.map(record => `
                <div class="sleep-entry">
                    <div class="sleep-entry-header">
                        <span class="sleep-entry-type">${record.type === 'nap' ? '😴 Nap' : '🌙 Night Sleep'}</span>
                        <span class="sleep-entry-duration">${record.durationText}</span>
                    </div>
                    <div class="sleep-entry-details">
                        <strong>Time:</strong> ${record.start.toLocaleTimeString()} - ${record.end.toLocaleTimeString()}<br>
                        <strong>Date:</strong> ${record.start.toLocaleDateString()}<br>
                        ${record.notes ? `<strong>Notes:</strong> ${record.notes}` : ''}
                    </div>
                    <button class="delete-btn" onclick="deleteRecord(${record.id})">Delete</button>
                </div>
            `).join('');
        }

        function deleteRecord(id) {
            sleepRecords = sleepRecords.filter(r => r.id !== id);
            displaySleepLog();
            updateStatistics();
        }

        function updateStatistics() {
            const today = new Date().toDateString();
            const todayRecords = sleepRecords.filter(r => r.start.toDateString() === today);

            const totalSleep = todayRecords.reduce((sum, r) => sum + r.duration, 0);
            const totalHours = Math.floor(totalSleep / 3600000);
            const totalMinutes = Math.floor((totalSleep % 3600000) / 60000);

            const napCount = todayRecords.filter(r => r.type === 'nap').length;
            
            const nightSleep = todayRecords.filter(r => r.type === 'night').reduce((sum, r) => sum + r.duration, 0);
            const nightHours = Math.floor(nightSleep / 3600000);
            const nightMinutes = Math.floor((nightSleep % 3600000) / 60000);

            document.getElementById('totalSleepStat').textContent = `${totalHours}h ${totalMinutes}m`;
            document.getElementById('napCountStat').textContent = napCount;
            document.getElementById('nightSleepStat').textContent = `${nightHours}h ${nightMinutes}m`;
        }

        async function getAIInsights() {
            if (sleepRecords.length === 0) {
                alert('Please track some sleep sessions first!');
                return;
            }

            const babyAge = document.getElementById('babyAge').value;
            const insightsBox = document.getElementById('aiInsights');
            const insightsText = document.getElementById('insightsText');
            const btn = document.getElementById('getInsightsBtn');

            btn.disabled = true;
            insightsBox.style.display = 'block';
            insightsText.innerHTML = '<div class="loading">🤔 Analyzing sleep patterns...</div>';

            const today = new Date().toDateString();
            const todayRecords = sleepRecords.filter(r => r.start.toDateString() === today);

            const sleepSummary = todayRecords.map(r => 
                `${r.type === 'nap' ? 'Nap' : 'Night Sleep'}: ${r.durationText} (${r.start.toLocaleTimeString()} - ${r.end.toLocaleTimeString()})${r.notes ? ` - Notes: ${r.notes}` : ''}`
            ).join('\n');

            try {
                const response = await fetch('https://api.anthropic.com/v1/messages', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify({
                        model: 'claude-sonnet-4-20250514',
                        max_tokens: 1000,
                        messages: [{
                            role: 'user',
                            content: `You are a baby sleep expert. Analyze this sleep data and provide insights:

${babyAge ? `Baby Age: ${babyAge} months` : 'Baby Age: Not specified'}

Today's Sleep Log:
${sleepSummary}

Please provide:
1. Assessment of sleep patterns (is this healthy for the age?)
2. Recommendations for improvement
3. Any concerns or red flags
4. Tips for better sleep routine

Keep the response concise, actionable, and encouraging.`
                        }]
                    })
                });

                const data = await response.json();
                const insights = data.content.find(item => item.type === 'text')?.text || 'Unable to generate insights.';
                
                insightsText.textContent = insights;
            } catch (error) {
                insightsText.textContent = '❌ Sorry, there was an error analyzing the sleep data. Please try again.';
            }

            btn.disabled = false;
        }
    </script>
    <script src="api.js"></script>
</body>
</html>
